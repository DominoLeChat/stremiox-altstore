name: Update AltStore Source
on:
  schedule:
    - cron: '0 0 * * *'  # Tous les jours à 00:00 UTC
  workflow_dispatch:     # Permet le trigger manuel
  release:
    types: [published]   # Trigger à chaque release (né©©essite PAT)

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          # Utilise le PAT pour que le release event re-trigger le workflow
          token: ${{ secrets.GH_PAT }}
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Update apps.json
        id: update
        run: |
          python update_json.py
          echo "updated=$(test -f apps.json && echo true || echo false)" >> $GITHUB_OUTPUT
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add apps.json
          if git diff --staged --quiet; then
            echo "No changes in apps.json"
          else
            git commit -m "Updated source with latest StremioX release"
            git push
            echo "Pushed new apps.json"
          fi
